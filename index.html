<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  componentDidMount() {
    const canvas = this.canvasRef.current;
    const ctx = canvas.getContext('2d');
    let w, h, dpr, orbs;
    const cs = getComputedStyle(canvas);
    const tint = (cs.getPropertyValue('--color-accent-2-500') || '#9184d9').trim();
    const tint2 = (cs.getPropertyValue('--color-accent-2-300') || '#c9c2ec').trim();

    const resize = () => {
      dpr = window.devicePixelRatio || 1;
      w = canvas.clientWidth;
      h = canvas.clientHeight;
      canvas.width = w * dpr;
      canvas.height = h * dpr;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      const count = Math.max(18, Math.floor((w * h) / 45000));
      orbs = Array.from({ length: count }, () => ({
        x: Math.random() * w,
        y: Math.random() * h,
        r: Math.random() * 60 + 30,
        vx: (Math.random() - 0.5) * 0.12,
        vy: (Math.random() - 0.5) * 0.1,
        phase: Math.random() * Math.PI * 2,
        speed: Math.random() * 0.0006 + 0.0003,
        color: Math.random() < 0.5 ? tint : tint2
      }));
    };
    resize();
    window.addEventListener('resize', resize);

    let raf;
    const draw = (t) => {
      ctx.clearRect(0, 0, w, h);
      orbs.forEach((o) => {
        o.x += o.vx;
        o.y += o.vy;
        if (o.x < -o.r) o.x = w + o.r;
        if (o.x > w + o.r) o.x = -o.r;
        if (o.y < -o.r) o.y = h + o.r;
        if (o.y > h + o.r) o.y = -o.r;
        const alpha = 0.08 + 0.07 * Math.sin(t * o.speed + o.phase);
        const grad = ctx.createRadialGradient(o.x, o.y, 0, o.x, o.y, o.r);
        grad.addColorStop(0, o.color);
        grad.addColorStop(1, 'transparent');
        ctx.globalAlpha = Math.max(0, alpha);
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(o.x, o.y, o.r, 0, Math.PI * 2);
        ctx.fill();
      });
      ctx.globalAlpha = 1;
      raf = requestAnimationFrame(draw);
    };
    raf = requestAnimationFrame(draw);

    this._cleanup = () => {
      cancelAnimationFrame(raf);
      window.removeEventListener('resize', resize);
    };
  }

  componentWillUnmount() {
    if (this._cleanup) this._cleanup();
  }

  renderVals() {
    if (!this.canvasRef) this.canvasRef = React.createRef();
    return { canvasRef: this.canvasRef };
  }
}

</script>
