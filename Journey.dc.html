<div dir="rtl" lang="ar" style="width:100vw;min-height:100vh;display:flex;flex-direction:column;align-items:center;gap:var(--space-4);background:radial-gradient(ellipse at 50% 15%, color-mix(in srgb, var(--color-accent-800) 45%, transparent) 0%, transparent 60%), radial-gradient(ellipse at 85% 90%, color-mix(in srgb, var(--color-accent-2-800) 40%, transparent) 0%, transparent 60%), var(--color-bg);font-family:'Cairo',var(--font-body);text-align:center;padding:var(--space-8) var(--space-6);box-sizing:border-box;">
